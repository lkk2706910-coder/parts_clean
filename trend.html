  <script>
  /* 多 CDN 備援：Edge Tracking Prevention 或內網防火牆若擋 jsdelivr，
     自動嘗試 cdnjs / unpkg，最後 fallback 到本地 ./libs/。 */
  (function(){
    var CHART_URLS = [
      'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js',
      'https://unpkg.com/chart.js@4.4.0/dist/chart.umd.min.js',
      './libs/chart.umd.min.js'
    ];
    var XLSX_URLS = [
      'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
      'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js',
      './libs/xlsx.full.min.js'
    ];
    function loadWithFallback(urls, name){
      var i = 0;
      (function next(){
        if(i >= urls.length){
          console.warn('[trend] ' + name + ' 全部 CDN 皆載入失敗，請檢查 Edge Tracking Prevention 或部署 ./libs/ 本地檔');
          window.__CDN_FAIL = (window.__CDN_FAIL || []).concat([name]);
          return;
        }
        var url = urls[i++];
        var s = document.createElement('script');
        s.src = url;
        s.async = false;
        s.onload  = function(){ console.log('[trend] ' + name + ' loaded from ' + url); };
        s.onerror = function(){ console.warn('[trend] ' + name + ' failed: ' + url + ' → try next'); next(); };
        document.head.appendChild(s);
      })();
    }
    loadWithFallback(CHART_URLS, 'Chart.js');
    loadWithFallback(XLSX_URLS,  'SheetJS');
  })();
  </script>
  <style>
    :root{
      --bg-page:#f3f6fc;
      --bg-card:#ffffff;
      --text:#1f2a44;
      --text-soft:#3b4a6b;
      --muted:#6c7a99;

      --accent-dark:#3b66cf;
      --grad-primary:linear-gradient(135deg,#5b8def 0%,#8b5cf6 100%);

    *{box-sizing:border-box}

    .card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;min-width:0}
    .filters{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px 10px;align-items:end;margin-bottom:14px}

    select,input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border-soft);background:#fff;color:var(--text);outline:none;font-size:13px;transition:border-color .15s,box-shadow .15s}

    /* ============ Excel 風 MultiSelect (checkbox dropdown) ============ */
    .ms{position:relative;width:100%}
    .ms-btn{width:100%;padding:8px 30px 8px 12px;border-radius:8px;border:1px solid var(--border-soft);background:#fff;color:var(--text);cursor:pointer;text-align:left;font-size:13px;font-weight:600;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}

    .ms-all input{width:auto;margin:0;cursor:pointer;accent-color:var(--accent)}

    .ms-group-title{padding:6px 10px 3px;font-size:10.5px;font-weight:800;color:var(--accent-dark);letter-spacing:.05em;text-transform:uppercase;background:#f7f9fd}
    .ms-empty{padding:12px;text-align:center;color:var(--muted);font-size:12px}
    .chart-host{position:relative;background:linear-gradient(180deg,#fbfcff 0%,#f5f8fe 100%);border:1px solid var(--border-soft);border-radius:12px;padding:14px;min-height:460px;box-shadow:inset 0 0 0 1px rgba(94,124,240,.04)}
    canvas{width:100% !important;max-height:520px}

    .debug-box{margin-top:14px;background:#f5f8fe;border:1px solid var(--border-soft);border-radius:10px;padding:10px}

    .debug-box pre{margin:8px 0 0;color:var(--text-soft);font-size:11.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow:auto;background:#fff;border:1px solid var(--border-soft);border-radius:8px;padding:8px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .back-link{color:var(--accent-dark);text-decoration:none;font-size:13px;font-weight:800;padding:7px 12px;border:1px solid var(--border-soft);border-radius:999px;background:#fff;transition:all .15s ease}

    .delta-toggle input{width:auto;margin:0;accent-color:var(--accent);cursor:pointer}

  <script>
    /* ============ 與主頁一致的資料 / 函式 ============ */
    const PART_SUFFIXES = ['faceplate','blockplate','processkits','rps','heater'];
    function getPartType(partsId){
      for(const suf of PART_SUFFIXES){ if(partsId.endsWith('-' + suf)) return suf; }
      return '';
    }
    function getGroupId(partsId){
      for(const suf of PART_SUFFIXES){
        const tail = '-' + suf;
        if(partsId.endsWith(tail)) return partsId.slice(0, -tail.length);
      }
      return '';
    }
    const TOOL_OPTIONS = {
      'nisacvd-sin': ['NISACVD-B01','NISACVD-B06','NISACVD-B07','NISACVD-B08'],
      'nisacvd-usg': ['NISACVD-B03','NISACVD-B12','NISACVD-B13','NISACVD-B14'],
      'nisacvd-4dc': ['NISACVD-B02','NISACVD-B04','NISACVD-B05','NISACVD-B09','NISACVD-B10','NISACVD-B11'],
      'sacvd-harp':  ['SACVD-B01','SACVD-B04','SACVD-B06','SACVD-B08','SACVD-B09','SACVD-B10'],
      'sacvd-sa':    ['SACVD-B02','SACVD-B11','SACVD-B12','SACVD-B81'],
      'sacvd-smt':   ['SACVD-B03','SACVD-B05','SACVD-B07'],
    };
    const ALL_TOOLS = Object.values(TOOL_OPTIONS).flat();
    const TOOL_TO_GROUP = (() => {
      const m = {};
      Object.entries(TOOL_OPTIONS).forEach(([g, ts]) => ts.forEach(t => { m[t] = g; }));
      return m;
    })();
    const PKIT_ALL = ['Top liner','Middle liner','Bottom liner','Spacer'];
    const FACEPLATE_ROUGH = {
      'nisacvd-sin-faceplate':8,
      'nisacvd-4dc-faceplate':8,
      'nisacvd-usg-faceplate':13,
      'sacvd-harp-faceplate':8,
      'sacvd-sa-faceplate':8,
      'sacvd-smt-faceplate':8,
    };
    function getMaxRoughCount(partsId){
      const type = getPartType(partsId);
      if(type === 'rps') return 0;
      if(type === 'faceplate') return FACEPLATE_ROUGH[partsId] || 8;
      if(type === 'heater') return 9;
      if(type === 'blockplate') return 8;
      if(type === 'processkits') return 8;
      return 0;
    }
    function computeStats(values){
      const nums = (values || []).map(v => parseFloat(v)).filter(n => !isNaN(n));
      if(nums.length === 0) return null;
      const max = Math.max(...nums), min = Math.min(...nums);
      const avg = nums.reduce((a,b)=>a+b,0)/nums.length;
      return { max, min, avg };
    }
    function pickRough(row, partsId){
      const n = getMaxRoughCount(partsId);
      const vals = [];
      for(let i=1;i<=n;i++){
        const v = row['rough'+i];
        if(v !== undefined && v !== null && v !== '') vals.push(v);
      }
      return computeStats(vals);
    }
    /* parseDate：支援 'YYYY/MM/DD'、'YYYY-MM-DD'、ISO 字串、Date 物件、Excel 序號 */
    function parseDate(s){
      const inRange = d => (!d || isNaN(d)) ? null
        : (d.getFullYear() < 1990 || d.getFullYear() > 2100) ? null : d;
      if(s == null || s === '') return null;
      if(s instanceof Date) return inRange(s);
      if(typeof s === 'number'){
        if(!s) return null;   // 0 視為無效，避免出現 1970/01/01
        // Excel 日期序號（1899/12/30 起算，約 36525=2000/01/01）
        if(s > 25569 && s < 80000){   // 需大於 25569 (=1970/01/01) 才是合理日期序號
          const d = new Date((s - 25569) * 86400 * 1000);
          return inRange(d);
        }
        // 毫秒 timestamp 也要在合理範圍
        if(s > 631152000000 && s < 4102444800000){  // 1990-01-01 ~ 2100-01-01
          return inRange(new Date(s));
        }
        return null;   // 其他數字皆視為無效
      }
      const t = String(s).trim();
      if(!t) return null;
      const m = t.replace(/-/g,'/').match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
      if(m){
        const d = new Date(+m[1], +m[2]-1, +m[3]);
        const r = inRange(d);
        if(r) return r;
      }
      return inRange(new Date(t));
    }
    function formatDate(ts){
      const d = new Date(ts);
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    }

    /* ============ 從後端拉所有資料 ============ */
    const IS_FILE = location.protocol === 'file:';
    // 用 new URL 解析成絕對位址，避免相對路徑在不同部署下歧義
    const API_BASE = new URL('./PartsCleanApi/parts-clean-handler.ashx', location.href).toString();

    /* ============ 「從 Excel 載入」用的欄位定義（與 parts-clean.html 一致） ============ */
    function _ymd2(d){ return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
    const DATE_KEYS = new Set(['pmDate','date','onDate','offDate']);
    function normalizeCell(v, key){
      if(v == null) return '';
      if(DATE_KEYS.has(key)){
        if(v instanceof Date) return isNaN(v) ? '' : _ymd2(v);
        if(typeof v === 'number' && v > 20000 && v < 80000){
          const d = new Date((v - 25569) * 86400 * 1000);
          if(!isNaN(d)) return _ymd2(d);
        }
      }
      return String(v).trim();
    }
    function getColumnsForType(type){
      if(type === 'rps'){
        return [
          {key:'tool',label:'Tool'},{key:'chamber',label:'Chamber'},{key:'side',label:'Side'},
          {key:'date',label:'Date'},{key:'category',label:'Category'},{key:'sn',label:'SN'},
          {key:'hours',label:'時數'},{key:'purgerCount',label:'Purger次數<50ea'},
          {key:'cleanBeforeIn',label:'Clean前(in端)PA'},{key:'cleanBeforeOut',label:'Clean前(out端)PA'},
          {key:'cleanAfterIn1',label:'Clean後(in) 1st'},{key:'cleanAfterIn2',label:'Clean後(in) 2nd'},{key:'cleanAfterIn3',label:'Clean後(in) 3rd'},
          {key:'cleanAfterOut1',label:'Clean後(out) 1st'},{key:'cleanAfterOut2',label:'Clean後(out) 2nd'},{key:'cleanAfterOut3',label:'Clean後(out) 3rd'},
          {key:'pa5',label:'PA5顆數每次'},{key:'pmStaff',label:'PM人員'},{key:'vendor',label:'維修商'},{key:'note',label:'備註'},
        ];
      }
      const cols = [
        {key:'tool',label:'Tool'},{key:'chamber',label:'Chamber'},{key:'side',label:'Side'},{key:'pmDate',label:'PM日期'},
      ];
      if(type === 'processkits') cols.push({key:'pkitName',label:'品名'});
      cols.push({key:'sn',label:'Parts S/N'},{key:'onDate',label:'上機日期'},{key:'offDate',label:'下機日期'},{key:'offReason',label:'下機原因'});
      if(type === 'faceplate' || type === 'blockplate' || type === 'processkits'){
        cols.push({key:'cleanType',label:'清洗方式'},{key:'selfWash',label:'自洗次數'},{key:'vendorWash',label:'廠洗次數'});
      }
      const maxR = type === 'faceplate' ? 13 : type === 'heater' ? 9 : 8;
      for(let i=1;i<=maxR;i++) cols.push({key:'rough'+i,label:'R'+i});
      if(type !== 'heater'){
        for(let i=1;i<=4;i++) cols.push({key:'particle'+i,label:'P'+i});
      }
      cols.push({key:'note',label:'備註'});
      return cols;
    }
    const SHEET_TO_TYPE = {
      'FACE PLATE':'faceplate','BLOCK PLATE':'blockplate',
      'PROCESS KITS':'processkits','RPS':'rps','HEATER':'heater',
    };
    async function loadFromExcel(file){
      if(typeof XLSX === 'undefined'){ alert('Excel 解析模組尚未載入，請檢查網路'); return; }
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array', cellDates:true});
      // 清空現有 allData / 錯誤
      Object.keys(allData).forEach(k => delete allData[k]);
      Object.keys(loadErrors).forEach(k => delete loadErrors[k]);
      let total = 0;
      const noTool = [], unknownTool = [];
      for(const sheetName of wb.SheetNames){
        const type = SHEET_TO_TYPE[(sheetName || '').trim().toUpperCase()];
        if(!type) continue;
        const grid = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {header:1, defval:''});
        if(grid.length < 2) continue;
        const headers = grid[0].map(h => String(h ?? '').trim());
        const cols = getColumnsForType(type);
        const keyByIdx = headers.map(h => (cols.find(c => c.label === h) || {}).key || null);
        if(keyByIdx.filter(Boolean).length === 0) continue;
        for(let i=1;i<grid.length;i++){
          const r = grid[i];
          if(!r || r.every(v => v == null || String(v).trim() === '')) continue;
          const obj = {};
          for(let j=0;j<keyByIdx.length;j++){
            const k = keyByIdx[j];
            if(k) obj[k] = normalizeCell(r[j], k);
          }
          if(!obj.tool){ noTool.push(i+1); continue; }
          const group = TOOL_TO_GROUP[obj.tool];
          if(!group){ unknownTool.push(obj.tool); continue; }
          const partsId = `${group}-${type}`;
          if(!allData[partsId]) allData[partsId] = [];
          allData[partsId].push(obj);
          total++;
        }
      }
      alert(`已從 Excel 載入 ${total} 筆${noTool.length?`（跳過 ${noTool.length} 列無 Tool）`:''}${unknownTool.length?`（跳過 ${unknownTool.length} 列 Tool 不在清單）`:''}`);
    }
    async function apiLoadRows(partsId){
      const url = `${API_BASE}?mode=load&partsId=${encodeURIComponent(partsId)}`;
      try{
        const r = await fetch(url, {cache:'no-store'});
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const d = await r.json();
        if(!d?.success) throw new Error(d?.error || 'success=false');
        return Array.isArray(d.rows) ? d.rows : [];
      }catch(e){
        throw new Error(e?.message || String(e));
      }
    }
    const PART_TYPES = ['faceplate','blockplate','processkits','rps','heater'];
    const GROUPS = Object.keys(TOOL_OPTIONS);
    const ALL_PARTS_IDS = [];
    GROUPS.forEach(g => PART_TYPES.forEach(t => ALL_PARTS_IDS.push(`${g}-${t}`)));

    /* 載入完成後初始化 */
    const allData = {};
    const loadErrors = {};
    async function loadAll(){
      if(IS_FILE){
        // file:// 模式：fetch 一定會失敗，直接略過，請使用者改用「從 Excel 載入」
        loadErrors['(file://)'] = '頁面以 file:// 開啟，瀏覽器禁止 fetch；請改用「從 Excel 載入」或部署到 IIS / HTTP';
        return;
      }
      await Promise.all(ALL_PARTS_IDS.map(async id => {
        try{
          allData[id] = await apiLoadRows(id);
        }catch(err){
          allData[id] = [];
          loadErrors[id] = String(err?.message || err);
        }
      }));
      const total = Object.values(allData).reduce((a,r) => a + (r?.length||0), 0);
      console.log('[trend] 載入完成，共', total, '筆。詳細：', allData);
      if(Object.keys(loadErrors).length) console.warn('[trend] 載入錯誤：', loadErrors);
    }

    /* ============ 篩選器 / 圖表 ============ */
    const els = {
      pkitWrap: document.getElementById('pkit-wrap'),
      yAxis:document.getElementById('f-y'),
      xAxis:document.getElementById('f-x'),
      showDelta: document.getElementById('f-delta'),
      info: document.getElementById('info'),
      canvas: document.getElementById('chart'),
    };
    let chart = null;
    let showDelta = !!(els.showDelta && els.showDelta.checked);
    const ms = {};   // Excel 風 MultiSelect 實例，setupFilters 內建立
    const debugEl = document.getElementById('debug');
    function writeDebug(lines){
      const txt = Array.isArray(lines) ? lines.join('\n') : String(lines);
      debugEl.textContent = txt;
      console.log('[trend]', txt);
    }

    function escapeAttr(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escapeText(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    /* ============ Excel 風 MultiSelect ============ */
    class MultiSelect {
      constructor(host, opts){
        this.host = host;
        host._ms = this;
        this.placeholder = opts?.placeholder || '請選擇';
        this.options = [];   // [{value, label, group?}]
        this.values = new Set();
        this.filter = '';
        this.onChange = opts?.onChange || null;
        this._build();
      }
      _build(){
        this.host.innerHTML =
          '<button type="button" class="ms-btn"></button>' +
          '<div class="ms-menu" hidden>' +
            '<div class="ms-search-wrap"><input type="search" class="ms-search" placeholder="搜尋…" /></div>' +
            '<label class="ms-all"><input type="checkbox" class="ms-cb-all" /><span>全選 / 取消全選</span></label>' +
            '<div class="ms-list"></div>' +
          '</div>';
        this.btn    = this.host.querySelector('.ms-btn');
        this.menu   = this.host.querySelector('.ms-menu');
        this.search = this.host.querySelector('.ms-search');
        this.cbAll  = this.host.querySelector('.ms-cb-all');
        this.list   = this.host.querySelector('.ms-list');

        this.btn.addEventListener('click', e => {
          e.stopPropagation();
          const wasOpen = !this.menu.hidden;
          MultiSelect.closeAll(this);
          if(wasOpen){ this.close(); } else { this.open(); }
        });
        this.menu.addEventListener('click', e => e.stopPropagation());
        this.search.addEventListener('input', () => {
          this.filter = this.search.value.trim().toLowerCase();
          this._renderList();
          this._updateAllCheckbox();
        });
        this.cbAll.addEventListener('change', () => {
          const visible = this._visibleOptions();
          if(this.cbAll.checked) visible.forEach(o => this.values.add(o.value));
          else                    visible.forEach(o => this.values.delete(o.value));
          this._renderList();
          this._updateBtn();
          this.onChange && this.onChange();
        });
        this.list.addEventListener('change', e => {
          const cb = e.target;
          if(cb.type !== 'checkbox') return;
          if(cb.checked) this.values.add(cb.value);
          else           this.values.delete(cb.value);
          const item = cb.closest('.ms-item');
          if(item) item.classList.toggle('checked', cb.checked);
          this._updateAllCheckbox();
          this._updateBtn();
          this.onChange && this.onChange();
        });
      }
      open(){ this.menu.hidden = false; this.host.classList.add('open'); this.search.focus(); }
      close(){
        this.menu.hidden = true;
        this.host.classList.remove('open');
        if(this.filter){ this.filter=''; this.search.value=''; this._renderList(); this._updateAllCheckbox(); }
      }
      static closeAll(except){
        document.querySelectorAll('.ms.open').forEach(el => {
          if(el._ms && (!except || el !== except.host)) el._ms.close();
        });
      }
      setOptions(options){
        this.options = options || [];
        const valid = new Set(this.options.map(o => o.value));
        Array.from(this.values).forEach(v => { if(!valid.has(v)) this.values.delete(v); });
        this._renderList();
        this._updateAllCheckbox();
        this._updateBtn();
      }
      setValues(arr){
        this.values = new Set(arr);
        this._renderList();
        this._updateAllCheckbox();
        this._updateBtn();
      }
      getValues(){ return Array.from(this.values); }
      _visibleOptions(){
        if(!this.filter) return this.options;
        return this.options.filter(o =>
          (o.label && String(o.label).toLowerCase().includes(this.filter)) ||
          (o.value && String(o.value).toLowerCase().includes(this.filter))
        );
      }
      _renderList(){
        const visible = this._visibleOptions();
        if(visible.length === 0){
          this.list.innerHTML = '<div class="ms-empty">' + (this.options.length === 0 ? '無選項' : '找不到符合的項目') + '</div>';
          return;
        }
        let html = '';
        let lastGroup = null;
        visible.forEach(o => {
          if(o.group && o.group !== lastGroup){
            html += '<div class="ms-group-title">' + escapeText(o.group) + '</div>';
            lastGroup = o.group;
          }else if(!o.group){ lastGroup = null; }
          const checked = this.values.has(o.value);
          html += '<label class="ms-item' + (checked ? ' checked' : '') + '">' +
                    '<input type="checkbox" value="' + escapeAttr(o.value) + '"' + (checked ? ' checked' : '') + ' />' +
                    '<span>' + escapeText(o.label) + '</span>' +
                  '</label>';
        });
        this.list.innerHTML = html;
      }
      _updateAllCheckbox(){
        const visible = this._visibleOptions();
        if(visible.length === 0){ this.cbAll.checked=false; this.cbAll.indeterminate=false; return; }
        const sel = visible.filter(o => this.values.has(o.value)).length;
        if(sel === 0){ this.cbAll.checked=false; this.cbAll.indeterminate=false; }
        else if(sel === visible.length){ this.cbAll.checked=true; this.cbAll.indeterminate=false; }
        else { this.cbAll.checked=false; this.cbAll.indeterminate=true; }
      }
      _updateBtn(){
        const total = this.options.length;
        const count = this.values.size;
        if(count === 0){
          this.btn.innerHTML = escapeText(this.placeholder) + ' <span style="color:var(--muted);font-weight:600;font-size:11px">(全部)</span>';
        }else if(count === total){
          this.btn.innerHTML = escapeText(this.placeholder) + ' <span class="ms-count">全 ' + count + '</span>';
        }else if(count === 1){
          const one = this.options.find(o => this.values.has(o.value));
          this.btn.textContent = one ? one.label : this.placeholder;
        }else{
          this.btn.innerHTML = escapeText(this.placeholder) + ' <span class="ms-count">' + count + '</span>';
        }
      }
    }
    /* 點外面 / Esc 收起所有下拉 */
    document.addEventListener('click', () => MultiSelect.closeAll(null));
    document.addEventListener('keydown', e => { if(e.key === 'Escape') MultiSelect.closeAll(null); });

    function fillTypeSelect(){
      ms.type.setOptions([
        {value:'faceplate',   label:'FACE PLATE'},
        {value:'blockplate',  label:'BLOCK PLATE'},
        {value:'processkits', label:'PROCESS KITS'},
        {value:'heater',      label:'HEATER'},
      ]);
    }
    function fillGroupSelect(){
      ms.group.setOptions(GROUPS.map(g => ({value:g, label:GROUP_LABEL[g] || g.toUpperCase()})));
    }
    function fillToolSelect(){
      const groups = ms.group.getValues();
      const groupsToShow = groups.length ? groups : GROUPS;
      const opts = [];
      groupsToShow.forEach(gid => {
        TOOL_OPTIONS[gid].forEach(t => opts.push({value:t, label:t, group:GROUP_LABEL[gid] || gid.toUpperCase()}));
      });
      ms.tool.setOptions(opts);
    }
    function fillPkitSelect(){
      ms.pkit.setOptions(PKIT_ALL.map(p => ({value:p, label:p})));
    }
    function refreshSnOptions(){
      const types  = ms.type.getValues();
      const groups = ms.group.getValues();
      const tools  = ms.tool.getValues();
      const pkits  = (types.length === 0 || types.includes('processkits')) ? ms.pkit.getValues() : [];
      const snSet = new Set();
      collectFilteredRows({types, groups, tools, pkits, sns:[]}).forEach(({row}) => {
        if(row.sn) snSet.add(row.sn);
      });
      ms.sn.setOptions(Array.from(snSet).sort().map(s => ({value:s, label:s})));
    }

    /* 收集符合條件的 row；每個篩選傳陣列，空陣列 = 「全部」 */
    function collectFilteredRows({types, groups, tools, pkits, sns}){
      const inArr = (arr, v) => !arr || arr.length === 0 || arr.includes(v);
      const result = [];
      ALL_PARTS_IDS.forEach(id => {
        const t = getPartType(id);
        if(t === 'rps') return;                    // RPS 無 Roughness
        if(!inArr(types, t)) return;
        const idGroup = getGroupId(id);
        if(!inArr(groups, idGroup)) return;
        (allData[id] || []).forEach(row => {
          if(!inArr(tools, row.tool)) return;
          if(!inArr(pkits, row.pkitName || '')) return;   // 非 processkits 的 row.pkitName 是 undefined
          if(!inArr(sns, row.sn)) return;
          result.push({partsId:id, row});
        });
      });
      return result;
    }
    const PART_TYPE_LABEL = {
      faceplate:'FACE PLATE', blockplate:'BLOCK PLATE',
      processkits:'PROCESS KITS', heater:'HEATER',
    };
    const GROUP_LABEL = {
      'nisacvd-sin':'NISACVD_SIN','nisacvd-4dc':'NISACVD_4DC','nisacvd-usg':'NISACVD_USG',
      'sacvd-harp':'SACVD_HARP','sacvd-sa':'SACVD_SA','sacvd-smt':'SACVD_SMT',
    };

    /* 取 X 軸值 */
    function xValue(row, mode){
      if(mode === 'time'){
        const d = parseDate(row.pmDate || row.date);
        return d ? d.getTime() : null;
      }
      const v = parseFloat(row[mode]);
      return isNaN(v) ? null : v;
    }

    const COLORS = [
      'rgba(40,90,200,1)',    // 深藍
      'rgba(105,55,220,1)',   // 深紫
      'rgba(6,150,100,1)',    // 深翠綠
      'rgba(210,60,80,1)',    // 深紅
      'rgba(210,130,8,1)',    // 深橙
      'rgba(8,150,135,1)',    // 深青綠
      'rgba(200,40,120,1)',   // 深粉紅
      'rgba(30,95,210,1)',    // 深寶藍
      'rgba(135,60,215,1)',   // 深葡萄紫
    ];
    const FILL_COLORS = COLORS.map(c => c.replace(',1)',',0.18)'));

    function refreshChart(){
      if(typeof Chart === 'undefined'){
        if(chart){ chart.destroy(); chart = null; }
        els.canvas.getContext('2d').clearRect(0,0,els.canvas.width,els.canvas.height);
        els.info.innerHTML =
          '<b style="color:#c62828">Chart.js 未載入成功，圖表無法繪製。</b><br/>' +
          '常見原因：Edge <b>Tracking Prevention</b> 或內網防火牆擋掉 CDN。<br/>' +
          '解法一：Edge → 設定 → 隱私權 → 追蹤防止 → 例外 → 加入 <code>[*.]jsdelivr.net</code>、<code>[*.]cdnjs.cloudflare.com</code>、<code>[*.]unpkg.com</code>，然後 Ctrl+F5。<br/>' +
          '解法二：把 <a href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" target="_blank">chart.umd.min.js</a> 與 <a href="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" target="_blank">xlsx.full.min.js</a> 下載後放到 <code>./libs/</code> 資料夾（跟 trend.html 同層）。';
        return;
      }
      const types  = ms.type.getValues();
      const groups = ms.group.getValues();
      const tools  = ms.tool.getValues();
      const pkits  = (types.length === 0 || types.includes('processkits')) ? ms.pkit.getValues() : [];
      const sns    = ms.sn.getValues();
      const yKey   = els.yAxis.value;     // 'max'/'min'/'avg'
      const xMode  = els.xAxis.value;     // 'time' / 'selfWash' / 'vendorWash'

      const filtered = collectFilteredRows({types, groups, tools, pkits, sns});
      const singleType = types.length === 1 ? types[0] : null;

      // 除錯計數
      let dbgWithRough = 0, dbgWithX = 0, dbgWithoutSn = 0;
      const dbgSample = [];

      // 分線：選了單一 PART 類型時，label 直接用 SN；否則加類型前綴以避免不同類型的同 SN 撞線
      const bySn = {};
      filtered.forEach(({partsId, row}) => {
        const pt = getPartType(partsId);
        const snStr = row.sn || '(無 SN)';
        if(!row.sn) dbgWithoutSn++;
        const k = singleType
          ? snStr
          : `[${PART_TYPE_LABEL[pt] || pt}] ${snStr}`;
        if(!bySn[k]) bySn[k] = [];
        const stats = pickRough(row, partsId);
        if(stats) dbgWithRough++;
        const x = xValue(row, xMode);
        if(x !== null) dbgWithX++;
        if(dbgSample.length < 3){
          dbgSample.push({
            partsId, sn:row.sn, tool:row.tool, chamber:row.chamber, side:row.side,
            pmDate:row.pmDate, date:row.date, selfWash:row.selfWash, vendorWash:row.vendorWash,
            roughSample:[row.rough1, row.rough2, row.rough3].filter(v => v != null && v !== ''),
            statsOk: !!stats, xOk: x !== null,
          });
        }
        if(!stats || x === null) return;
        bySn[k].push({ x, y: stats[yKey], row, partsId });
      });

      // 除錯訊息：每次重畫都更新
      const totalLoaded = Object.values(allData).reduce((a,r) => a + (r?.length||0), 0);
      const perPartsId = ALL_PARTS_IDS.map(id => `  ${id}: ${(allData[id]||[]).length}`).filter(s => !s.endsWith(': 0')).join('\n');
      const errCount = Object.keys(loadErrors).length;
      const fetchFailed = Object.values(loadErrors).some(e => /Failed to fetch|NetworkError/i.test(String(e)));
      writeDebug([
        `頁面 URL：${location.href}`,
        `API URL ：${API_BASE}`,
        `Y 軸: ${yKey.toUpperCase()}  X 軸: ${xMode}`,
        `篩選: type=[${types.join(',')||'所有'}] group=[${groups.join(',')||'所有'}] tool=[${tools.join(',')||'所有'}] pkit=[${pkits.join(',')||'所有'}] sn=[${sns.join(',')||'所有'}]`,
        `後端載入共 ${totalLoaded} 筆，非空 partsId：`,
        perPartsId || '  (全部為空)',
        ``,
        `符合篩選 ${filtered.length} 筆  |  有 Roughness 值 ${dbgWithRough} 筆  |  X 軸 (${xMode}) 有效 ${dbgWithX} 筆  |  無 SN ${dbgWithoutSn} 筆`,
        errCount ? `\n載入錯誤 ${errCount} 個：\n` + Object.entries(loadErrors).slice(0,6).map(([id,e]) => `  ${id} → ${e}`).join('\n') + (errCount>6?`\n  …另外 ${errCount-6} 個`:'') : '',
        IS_FILE ? '\n※ 目前是 file:// 模式：瀏覽器禁止 fetch 後端。請點上方「從 Excel 載入」選擇主頁匯出的 PartsClean_export_*.xlsx；或部署到 IIS / HTTP 開啟。' :
        fetchFailed ? '\n※ 出現「Failed to fetch」常見原因：\n  1) PartsCleanApi 資料夾或 parts-clean-handler.ashx 沒部署到 trend.html 同一個站點底下\n  2) 站點被 HTTPS 與 HTTP 混合擋下\n  → 直接把 API URL 貼到瀏覽器網址列開看看，如果連那個都不行就是路徑 / 部署問題' : '',
        dbgSample.length ? '\n抽樣 ' + dbgSample.length + ' 筆：\n' + JSON.stringify(dbgSample, null, 2) : '',
      ].filter(Boolean));

      const datasets = Object.entries(bySn)
        .map(([sn, points], idx) => {
          points.sort((a,b) => a.x - b.x);
          const color = COLORS[idx % COLORS.length];
          const fill  = FILL_COLORS[idx % FILL_COLORS.length];
          return {
            label: sn,
            data: points.map(p => ({x:p.x, y:p.y})),
            borderColor: color,
            backgroundColor: fill,
            borderWidth: 2.5,
            pointRadius: 6,
            pointHoverRadius: 9,
            pointBorderWidth: 2,
            pointBackgroundColor: color,
            pointBorderColor: '#ffffff',
            pointHoverBorderWidth: 2.5,
            tension: 0.15,
            spanGaps: true,
            fill: false,
          };
        })
        .filter(d => d.data.length > 0);

      const allY = datasets.flatMap(d => d.data.map(p => p.y)).filter(v => typeof v === 'number' && !isNaN(v));
      const maxY = allY.length ? Math.max(...allY) : 0;
      const yMax = maxY > 0 ? maxY * 1.1 : 1;

      const xTitle = xMode === 'time' ? '時間'
                   : xMode === 'selfWash' ? '自洗次數' : '廠洗次數';
      const yTitle = `Roughness ${yKey.toUpperCase()}`;

      if(chart){ chart.destroy(); chart = null; }

      if(datasets.length === 0){
        els.canvas.getContext('2d').clearRect(0,0,els.canvas.width,els.canvas.height);
        // 細部診斷：看看篩選後在哪一步被刷掉
        const loaded = Object.values(allData).reduce((a,r) => a + (r?.length||0), 0);
        const totalFiltered = filtered.length;
        let withRough = 0, withX = 0, withSn = 0;
        filtered.forEach(({row, partsId}) => {
          if(pickRough(row, partsId)) withRough++;
          if(xValue(row, xMode) !== null) withX++;
          if(row.sn) withSn++;
        });
        const xLabel = xMode === 'time' ? 'PM 日期 (時間軸)' : (xMode==='selfWash'?'自洗次數':'廠洗次數');
        els.info.innerHTML = '<b>沒有可繪製的資料</b><br/>'
          + `後端載入：<b>${loaded}</b> 筆　|　符合篩選：<b>${totalFiltered}</b> 筆<br/>`
          + `其中有 Roughness 值：<b>${withRough}</b> 筆　|　有效 X 軸 (<b>${xLabel}</b>)：<b>${withX}</b> 筆　|　有 SN：<b>${withSn}</b> 筆<br/>`
          + (loaded === 0 ? '※ 後端載入為 0，可能是 ./PartsCleanApi/parts-clean-handler.ashx 路徑或權限問題' :
             withRough === 0 ? '※ 沒有任何紀錄填了 R1..Rn 量測點' :
             withX === 0 && xMode==='time' ? '※ PM 日期格式無法解析（試試另存或重新填寫日期欄位）' :
             withX === 0 ? `※ 所有紀錄的 ${xLabel} 都是空的 (試試把 X 軸切到「時間」)` :
             '※ 請放寬篩選條件');
        return;
      }

      // Δ 值繪製 plugin：讀取外層 showDelta 變數，避免每次 refreshChart 才能更新
      const deltaLabelsPlugin = {
        id: 'deltaLabels',
        afterDatasetsDraw(c){
          if(!showDelta) return;
          const cctx = c.ctx;
          cctx.save();
          cctx.font = 'bold 13px system-ui, sans-serif';
          cctx.textAlign = 'center';
          cctx.textBaseline = 'middle';
          // 已畫的 Δ label 矩形，用於偵測重疊
          const drawn = [];
          const overlaps = (a, b) => !(a.x + a.w < b.x || b.x + b.w < a.x ||
                                       a.y + a.h < b.y || b.y + b.h < a.y);
          // 收集所有候選 label：先算 x（靠 dataset 順序，讓後畫的 dataset 蓋前面），穩定
          const candidates = [];
          c.data.datasets.forEach((ds, di) => {
            const meta = c.getDatasetMeta(di);
            if(!meta || meta.hidden) return;
            const pts = meta.data;
            for(let i=1; i<pts.length; i++){
              const p0 = pts[i-1], p1 = pts[i];
              if(!p0 || !p1) continue;
              const y0 = ds.data[i-1]?.y, y1 = ds.data[i]?.y;
              if(!Number.isFinite(y0) || !Number.isFinite(y1)) continue;
              candidates.push({ p0, p1, delta: y1 - y0 });
            }
          });
          // 由 X 座標排序，讓左右相鄰的 Δ 優先度一致
          candidates.sort((a, b) => (a.p0.x + a.p1.x) - (b.p0.x + b.p1.x));

          for(const cand of candidates){
            const { p0, p1, delta } = cand;
            const label = (delta >= 0 ? '+' : '') + delta.toFixed(2);
            const color = delta > 0 ? '#c62828' : delta < 0 ? '#2e7d32' : '#374151';
            const metrics = cctx.measureText(label);
            const padX = 6;
            const w = metrics.width + padX * 2;
            const h = 18;
            const midX = (p0.x + p1.x) / 2;
            const midYBase = (p0.y + p1.y) / 2;
            // 嘗試多個垂直位置：優先中點上方 16px，若重疊則往上或往下再試
            const yOffsets = [-16, -34, -52, 16, 34, 52, -70, 70];
            let placed = null;
            for(const off of yOffsets){
              const midY = midYBase + off;
              const rect = { x: midX - w/2, y: midY - h/2, w, h };
              if(!drawn.some(r => overlaps(r, rect))){
                placed = { midY, rect };
                break;
              }
            }
            if(!placed) continue;   // 全部位置都重疊 → 跳過此 label 避免畫面混亂
            drawn.push(placed.rect);
            const { midY, rect } = placed;
            const rx = rect.x, ry = rect.y;
            cctx.beginPath();
            if(cctx.roundRect){
              cctx.roundRect(rx, ry, w, h, 6);
            }else{
              const r = 6;
              cctx.moveTo(rx+r, ry);
              cctx.lineTo(rx+w-r, ry);
              cctx.quadraticCurveTo(rx+w, ry, rx+w, ry+r);
              cctx.lineTo(rx+w, ry+h-r);
              cctx.quadraticCurveTo(rx+w, ry+h, rx+w-r, ry+h);
              cctx.lineTo(rx+r, ry+h);
              cctx.quadraticCurveTo(rx, ry+h, rx, ry+h-r);
              cctx.lineTo(rx, ry+r);
              cctx.quadraticCurveTo(rx, ry, rx+r, ry);
              cctx.closePath();
            }
            cctx.fillStyle = 'rgba(255,255,255,.97)';
            cctx.fill();
            cctx.lineWidth = 1.3;
            cctx.strokeStyle = color;
            cctx.stroke();
            cctx.fillStyle = color;
            cctx.fillText(label, midX, midY + 0.5);
          }
          cctx.restore();
        }
      };

      chart = new Chart(els.canvas.getContext('2d'), {
        type: 'line',
        data: { datasets },
        plugins: [deltaLabelsPlugin],
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode:'nearest', intersect:false },
          plugins: {
            legend: {
              display: datasets.length <= 15,
              position: 'bottom',
              labels: { color:'#3b4a6b', font:{ weight:'600' }, boxWidth:14, padding:8 },
            },
            tooltip: {
              callbacks: {
                title: items => {
                  if(!items.length) return '';
                  const x = items[0].parsed.x;
                  return xMode === 'time' ? formatDate(x) : `${xTitle}: ${x}`;
                },
                label: it => {
                  const base = `${it.dataset.label}: ${it.parsed.y?.toFixed?.(3) ?? it.parsed.y}`;
                  const i = it.dataIndex;
                  const prev = it.dataset.data[i-1];
                  if(prev && Number.isFinite(prev.y)){
                    const d = it.parsed.y - prev.y;
                    return base + `  (Δ ${d >= 0 ? '+' : ''}${d.toFixed(3)})`;
                  }
                  return base;
                },
              }
            }
          },
          scales: {
            x: {
              type: 'linear',
              title: { display:true, text:xTitle, color:'#0f1a36', font:{ weight:'800', size:18 } },
              ticks: {
                color:'#1f2a44',
                font:{ weight:'700', size:14 },
                // 清洗次數模式：只顯示整數 tick、間距 1；時間模式維持自動
                ...(xMode === 'time' ? {} : { stepSize: 1, precision: 0 }),
                callback: v => {
                  if(xMode === 'time') return formatDate(v);
                  // 只顯示整數，非整數 tick 隱藏
                  return Number.isInteger(v) ? v : null;
                },
              },
              grid: { color:'rgba(60,90,170,.18)' },
              border: { color:'#3b4a6b', width:1.5 },
            },
            y: {
              min: 0,
              max: yMax,
              title: { display:true, text:yTitle, color:'#0f1a36', font:{ weight:'800', size:18 } },
              ticks: { color:'#1f2a44', font:{ weight:'700', size:14 } },
              grid: { color:'rgba(60,90,170,.18)' },
              border: { color:'#3b4a6b', width:1.5 },
            }
          }
        }
      });

      const totalPoints = datasets.reduce((a,d) => a + d.data.length, 0);
      const legendHint = datasets.length > 15
        ? '　|　<span style="color:#c62828">📌 線條數 > 15 已自動隱藏 legend；用篩選器縮小 SN 或機台範圍再看</span>'
        : '';
      els.info.innerHTML =
        `共 <b>${datasets.length}</b> 條線（依 S/N）／ <b>${totalPoints}</b> 個資料點　|　` +
        `Y: <b>${yTitle}</b>　X: <b>${xTitle}</b>　|　Y 軸上界：<b>${yMax.toFixed(3)}</b>（最大值 ${maxY.toFixed(3)} × 1.1）` +
        legendHint;
    }

    /* ============ 初始化 ============ */
    function syncPkitVisibility(){
      const types = ms.type.getValues();
      els.pkitWrap.hidden = types.length > 0 && !types.includes('processkits');
    }
    function setupFilters(){
      ms.type  = new MultiSelect(document.getElementById('ms-type'),  {placeholder:'PART 類型', onChange:onFilterChange('type')});
      ms.group = new MultiSelect(document.getElementById('ms-group'), {placeholder:'機型',      onChange:onFilterChange('group')});
      ms.tool  = new MultiSelect(document.getElementById('ms-tool'),  {placeholder:'機台',      onChange:onFilterChange('tool')});
      ms.pkit  = new MultiSelect(document.getElementById('ms-pkit'),  {placeholder:'品名',      onChange:onFilterChange('pkit')});
      ms.sn    = new MultiSelect(document.getElementById('ms-sn'),    {placeholder:'Parts S/N', onChange:onFilterChange('sn')});
    }
    function onFilterChange(kind){
      return () => {
        if(kind === 'type'){ syncPkitVisibility(); refreshSnOptions(); }
        if(kind === 'group'){ fillToolSelect(); refreshSnOptions(); }
        if(kind === 'tool' || kind === 'pkit'){ refreshSnOptions(); }
        refreshChart();
      };
    }

    function whenChartJsReady(){
      // 最多等 10 秒。超時就 resolve，讓 refreshChart 顯示明確錯誤，避免頁面一直卡在「正在載入」
      return new Promise(resolve => {
        if(typeof Chart !== 'undefined') return resolve();
        let waited = 0;
        const t = setInterval(() => {
          if(typeof Chart !== 'undefined'){ clearInterval(t); resolve(); return; }
          waited += 50;
          if(waited >= 10000 || (window.__CDN_FAIL || []).indexOf('Chart.js') !== -1){
            clearInterval(t); resolve();
          }
        }, 50);
      });
    }

    (async () => {
      setupFilters();
      fillTypeSelect();
      fillGroupSelect();
      fillToolSelect();
      fillPkitSelect();
      els.info.textContent = '正在載入資料…';
      await loadAll();
      await whenChartJsReady();
      syncPkitVisibility();
      refreshSnOptions();
      refreshChart();

      // Y 軸 / X 軸下拉維持 native (單選)
      [els.yAxis, els.xAxis].forEach(el => {
        el.addEventListener('change', refreshChart);
      });

      // Δ 值 checkbox 獨立處理：只做 chart.update()，不重跑資料收集與 refreshChart，避免篩選內容視覺復歸
      els.showDelta?.addEventListener('change', () => {
        showDelta = !!els.showDelta.checked;
        if(chart) chart.update('none');
      });

      document.getElementById('reload')?.addEventListener('click', async () => {
        Object.keys(allData).forEach(k => delete allData[k]);
        Object.keys(loadErrors).forEach(k => delete loadErrors[k]);
        els.info.textContent = '正在重新載入…';
        await loadAll();
        refreshSnOptions();
        refreshChart();
      });
      document.getElementById('load-from-excel')?.addEventListener('click', () => {
        document.getElementById('excel-input').click();
      });
      document.getElementById('excel-input')?.addEventListener('change', async ev => {
        const file = ev.target.files?.[0];
        ev.target.value = '';
        if(!file) return;
        try{
          await loadFromExcel(file);
          refreshSnOptions();
          refreshChart();
        }catch(err){
          console.error(err);
          alert('Excel 載入失敗：' + (err?.message || err));
        }
      });
    })();
  </script>
</body>
</html>
